<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artistic World Shop</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff; /* white base */
    color: #1f2a37;
}

/* ===== NAVBAR ===== */
header {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(255,255,255,0.95);
    display: flex;
    justify-content: space-between;
    padding: 14px 30px;
    z-index: 1000;
    border-bottom: 1px solid #e5e7eb;
    backdrop-filter: blur(10px);
}

header h1 {
    font-size: 18px;
    color: #0284c7; /* sky blue */
}

.cart-btn {
    cursor: pointer;
    background: #0284c7;
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
}

/* ===== HERO ===== */
.hero {
    height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    background: linear-gradient(135deg, #ffffff, #e0f2fe); /* white → sky */
    padding: 20px;
}

.hero h2 {
    font-size: 48px;
    color: #0f172a;
}

.hero p {
    color: #475569;
}

/* ===== PRODUCTS ===== */
.section {
    padding: 80px 10%;
    background: #ffffff;
}

.section h2 {
    color: #0f172a;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

/* ===== PRODUCT CARD ===== */
.product {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
}

.product:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(2,132,199,0.15);
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.product button {
    margin-top: 10px;
    background: #0284c7;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.product button:hover {
    background: #0369a1;
}

/* ===== CART SIDEBAR ===== */
.cart {
    position: fixed;
    right: -400px;
    top: 0;
    width: 350px;
    height: 100%;
    background: white;
    box-shadow: -5px 0 20px rgba(0,0,0,0.1);
    transition: 0.3s;
    padding: 20px;
    z-index: 2000;
}

.cart.active {
    right: 0;
}

.cart h2 {
    margin-top: 50px;
    color: #0284c7;
}

.cart-item {
    border-bottom: 1px solid #e5e7eb;
    padding: 10px 0;
}

/* ===== CHECKOUT ===== */
.checkout {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;
    padding: 40px;
    z-index: 3000;
}

.checkout input, .checkout textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
}

.checkout button {
    background: #0284c7;
    color: white;
    padding: 12px;
    border: none;
    cursor: pointer;
    width: 100%;
    border-radius: 8px;
}

/* ===== MODAL ===== */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 4000;
}

.modal-content {
    background: white;
    padding: 20px;
    width: 300px;
    margin: 10% auto;
    border-radius: 12px;
}

.close {
    float: right;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- NAV -->
<header>
    <h1>Artistic World</h1>
    <button class="cart-btn" onclick="toggleCart()">
        Cart 🛒 (<span id="count">0</span>)
    </button>
</header>

<!-- HERO -->
<section class="hero">
    <h2>Artistic World Shop</h2>
    <p>Modern lifestyle products at one place</p>
</section>

<!-- PRODUCTS -->
<section class="section">
    <h2>Products</h2>

    <div class="grid">

        <div class="product">
            <h3>Clothing Set</h3>
            <p>$29.99</p>
            <button onclick="addToCart('Clothing Set', 29.99)">Add to Cart</button>
            <button onclick="openModal('Clothing Set',29.99)">View</button>
        </div>

        <div class="product">
            <h3>Korean Skincare</h3>
            <p>$19.99</p>
            <button onclick="addToCart('Skincare', 19.99)">Add to Cart</button>
            <button onclick="openModal('Skincare',19.99)">View</button>
        </div>

    </div>
</section>

<!-- CART -->
<div class="cart" id="cart">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <button onclick="checkout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkout">
    <h2>Checkout</h2>
    <input id="name" placeholder="Your Name">
    <textarea id="address" placeholder="Address"></textarea>
    <button onclick="sendWhatsApp()">Place Order on WhatsApp</button>
</div>

<!-- PRODUCT MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">X</span>
        <h3 id="mName"></h3>
        <p id="mPrice"></p>
    </div>
</div>

<script>

let cart = [];

function addToCart(name, price){
    cart.push({name, price});
    document.getElementById("count").innerText = cart.length;
    renderCart();
}

function renderCart(){
    let html = "";
    cart.forEach(item=>{
        html += `<div class="cart-item">${item.name} - $${item.price}</div>`;
    });
    document.getElementById("cartItems").innerHTML = html;
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("active");
}

function checkout(){
    document.getElementById("checkout").style.display = "block";
}

function sendWhatsApp(){
    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;

    let message = `Order from ${name}%0AAddress: ${address}%0AItems:%0A`;

    cart.forEach(item=>{
        message += `- ${item.name} $${item.price}%0A`;
    });

    let url = `https://wa.me/8801406749267?text=${message}`;
    window.open(url, "_blank");
}

function openModal(name,price){
    document.getElementById("modal").style.display="block";
    document.getElementById("mName").innerText=name;
    document.getElementById("mPrice").innerText="$"+price;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
