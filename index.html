<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artistic World</title>

<style>
/* ===== HEADER LAYOUT ===== */
header {
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid #ddd;
}

/* 1st row: Artistic World */
.top-row {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  padding: 12px 20px;
}

/* Artistic World styling ONLY */
.brand {
  background-color: #4a90e2; /* change color here */
  color: white;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 18px;
  font-weight: bold;
  display: inline-block;
}

/* 2nd row: menu */
.bottom-row {
  display: flex;
  gap: 25px;
  padding: 10px 20px;
}

/* menu links */
.bottom-row a {
  text-decoration: none;
  color: #333;
  font-weight: 500;
}

/* optional hover effect */
.bottom-row a:hover {
  color: #4a90e2;
}
</style>
</head>

<body>

<header>

  <!-- 1st ROW -->
  <div class="top-row">
    <div class="brand">Artistic World</div>
  </div>

  <!-- 2nd ROW -->
  <nav class="bottom-row">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#shop">Shop</a>
    <a href="#contact">Contact</a>
  </nav>

</header>

</body>
</html>
