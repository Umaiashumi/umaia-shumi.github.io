<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artistic World Shop</title>

<style>

/* ===== BASE ===== */
body{
margin:0;
font-family:Arial;
background:#f6f1e7;
color:#2f2f2f;
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 25px;
background:#fff;
border-bottom:1px solid #ddd;
z-index:1000;
}

.cart-btn{
background:#3f6f58;
color:#fff;
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* ===== HERO ===== */
.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#f6f1e7,#e9efe6);
}

.hero h1{font-size:45px}

/* ===== PRODUCTS ===== */
.section{
padding:90px 10%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#fff;
padding:15px;
border-radius:12px;
border:1px solid #ddd;
text-align:center;
}

button{
background:#3f6f58;
color:#fff;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

/* ===== CART SIDEBAR ===== */
.cart{
position:fixed;
right:-400px;
top:0;
width:320px;
height:100%;
background:#fff;
box-shadow:-5px 0 20px rgba(0,0,0,0.1);
padding:20px;
transition:0.3s;
z-index:2000;
overflow:auto;
}

.cart.active{right:0}

/* ===== CHECKOUT ===== */
.checkout{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#fff;
padding:40px;
z-index:3000;
}

.checkout input,.checkout textarea{
width:100%;
padding:10px;
margin:10px 0;
}

/* ===== MODAL ===== */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:4000;
}

.modal-box{
background:#fff;
width:300px;
margin:10% auto;
padding:20px;
border-radius:12px;
}

.close{
float:right;
cursor:pointer;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
<h2>Artistic World</h2>
<button class="cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="count">0</span>)
</button>
</header>

<!-- HERO -->
<div class="hero">
<h1>Artistic World Shop</h1>
<p>Modern lifestyle products</p>
</div>

<!-- PRODUCTS -->
<div class="section">
<h2>Products</h2>

<div class="grid">

<div class="card">
<h3>Clothing Set</h3>
<p>$30</p>
<button onclick="add('Clothing Set',30)">Add to Cart</button>
<button onclick="view('Clothing Set',30)">View</button>
</div>

<div class="card">
<h3>Korean Skincare</h3>
<p>$20</p>
<button onclick="add('Skincare',20)">Add to Cart</button>
<button onclick="view('Skincare',20)">View</button>
</div>

</div>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<br>
<button onclick="openCheckout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkout">
<h2>Checkout</h2>

<input id="name" placeholder="Your Name">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="whatsappOrder()">Place Order on WhatsApp</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">X</span>
<h3 id="mName"></h3>
<p id="mPrice"></p>
</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function update(){
document.getElementById("count").innerText = cart.length;

let html="";
cart.forEach(i=>{
html+=`<p>${i.name} - $${i.price}</p>`;
});

document.getElementById("cartItems").innerHTML=html;
localStorage.setItem("cart",JSON.stringify(cart));
}

function add(name,price){
cart.push({name,price});
update();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function openCheckout(){
document.getElementById("checkout").style.display="block";
}

function whatsappOrder(){

let name=document.getElementById("name").value;
let address=document.getElementById("address").value;

let msg=`Order from ${name}%0AAddress: ${address}%0AItems:%0A`;

cart.forEach(i=>{
msg+=`- ${i.name} $${i.price}%0A`;
});

let url=`https://wa.me/8801406749267?text=${msg}`;
window.open(url,"_blank");
}

function view(name,price){
document.getElementById("modal").style.display="block";
document.getElementById("mName").innerText=name;
document.getElementById("mPrice").innerText="$"+price;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

update();

</script>

</body>
</html>
